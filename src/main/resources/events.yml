events:
  WEIRD_MACHINE:
    intro: "角落里有一台破损的机器，还在发出低沉嗡鸣。"
    option_1: "不要碰它"
    option_2: "强行启动"
  ABANDONED_SUPPLIES:
    intro: "你发现了另一支队伍遗留下来的不稳定补给箱。"
    option_1: "分发安全口粮"
    option_2: "注射兴奋剂包"
  WHISPERING_CONSOLE:
    intro: "一台死去的终端闪烁着扭曲破碎的文字。"
    option_1: "立刻关闭"
    option_2: "读取残余日志"
