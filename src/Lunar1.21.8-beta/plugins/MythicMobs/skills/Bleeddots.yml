  - setvariable{var=caster.attack_type;type=STRING;val="bleed_dot"} @self
  - damage{a="<caster.var.bleed_intensity>";ia=true;pi=true} @self
  - effect:particles{p=block_crack;material=REDSTONE_BLOCK;amount=120;v=0.5;s=0.2} @self
  - delay 2
  - skill{s=System_Bleed_Player_T4_Aftermath} @self

