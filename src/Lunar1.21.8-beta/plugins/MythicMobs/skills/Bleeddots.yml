System_Bleed_Player_T3_Aftermath:
  Skills:
  - variablesubtract{var=caster.bleed_intensity;amount=30} @self
  - setvariable{var=caster.lust_fragility;type=INTEGER;val=0} ?!variableisset{var=caster.lust_fragility} @self
  - variableadd{var=caster.lust_fragility;amount=1} @self
  - skill{s=System_Add_LustFragility} @self
  - setvariable{var=caster.bleed_resolution_snapshot;type=INTEGER;val=0} @self

System_Execute_Bleed_Player_T4:
  Skills:
  - setvariable{var=caster.bleed_resolution_snapshot;type=INTEGER;val="<caster.var.bleed_intensity|int>"} @self
